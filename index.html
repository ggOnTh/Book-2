<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫번째 아이디어</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #001f3f 0%, #000814 100%);
            --accent-color: #00d4ff;
            --main-blue: #007bff;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-color);
        }

        .container {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fetchIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 {
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin: 0;
            background: linear-gradient(to bottom, #00d4ff, #007bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 123, 255, 0.4));
        }

        .brand {
            font-weight: 300;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            display: block;
            opacity: 0.9;
        }

        @keyframes fetchIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Subtle background animation */
        .glow {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 123, 255, 0.15) 0%, rgba(0, 123, 255, 0) 70%);
            border-radius: 50%;
            top: 10%;
            left: 20%;
            filter: blur(100px);
            z-index: -1;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1) translate(0, 0); }
            to { transform: scale(1.2) translate(5%, 5%); }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <span class="brand">Innovation</span>
        <h1>내 첫번째 아이디어</h1>
    </div>
</body>
</html>
